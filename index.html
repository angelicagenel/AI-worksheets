<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spanish Learning Edge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ivory: #F8F8F6;
      --eucalyptus: #557076;
      --charcoal: #2F3437;
      --secondary: #474747;
      --border: #DCDCDC;
      --surface: #F0F3F3;
    }
    body {
      background: var(--ivory);
      color: var(--charcoal);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-top: 5px solid var(--eucalyptus);
      border-radius: 14px;
      box-shadow: 0 3px 12px rgba(47,52,55,.08);
      padding: 2.5rem 2rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .brand {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--eucalyptus);
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--charcoal);
      margin-bottom: 1.25rem;
      line-height: 1.2;
    }
    p {
      font-size: 1rem;
      color: var(--secondary);
      line-height: 1.6;
    }
    .accent {
      width: 50px;
      height: 4px;
      background: #D5ADAD;
      border-radius: 3px;
      margin: 1.25rem auto;
    }
    footer {
      margin-top: 2rem;
      font-size: .78rem;
      color: var(--eucalyptus);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Spanish Learning Edge</div>
    <h1>Access your workbooks through your course</h1>
    <div class="accent"></div>
    <p>Access your Spanish Learning Edge workbooks through your course in <strong>Canvas</strong> or <strong>Moodle</strong>.</p>
  </div>
  <footer>&copy; 2025 Spanish Learning Edge LLC</footer>
</body>
</html>
